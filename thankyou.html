<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — s1dekick</title>
  <meta http-equiv="refresh" content="6;url=index.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      animation: fadeUp 0.6s ease-out;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(59, 122, 107, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 400;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .message {
      color: rgba(255,255,255,0.6);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .redirect-note {
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .redirect-note span {
      font-variant-numeric: tabular-nums;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 100px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      background: #3B7A6B;
      color: #fff;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #2d5f53;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .logo {
      position: absolute;
      top: 28px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 1.05rem;
      color: #fff;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #3B7A6B;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    s1dekick
  </a>

  <div class="card">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#3B7A6B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>

    <h1>We've got your message</h1>
    <p class="message">
      Thank you for reaching out. We'll get back to you within 24 hours to book your free discovery call.
    </p>

    <p class="redirect-note">Redirecting to the main page in <span id="countdown">5</span> seconds...</p>

    <a href="index.html" class="btn">
      Go back now
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

  <script>
    let seconds = 5;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>

</body>
</html>
